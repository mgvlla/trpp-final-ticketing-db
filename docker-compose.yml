services:
  postgres:
    image: postgres:16
    container_name: trpp_final_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: event_ticketing_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
